; IONOS production-oriented PHP settings (root directory)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL

; Limits
memory_limit = 256M
post_max_size = 16M
upload_max_filesize = 16M
max_execution_time = 60
max_input_time = 60
max_input_vars = 2000

; Sessions hardening
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_only_cookies = 1

; Security defaults
expose_php = Off
allow_url_fopen = Off
