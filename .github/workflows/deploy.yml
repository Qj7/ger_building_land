# Publishes static files to GitHub Pages. PHP API does not execute there.
# For admin/API on IONOS, configure ADMIN_LOGIN + ADMIN_PASSWORD (hosting env or api/env.local.php).
# Store credentials as GitHub Actions secrets if your deploy pipeline generates env.local.php (see IONOS_DEPLOY.md).

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
